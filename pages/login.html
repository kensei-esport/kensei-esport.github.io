<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Kensei Esport</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="icon" href="../assets/images/orange_logo.png" type="image/png" />
</head>
<body>
  <div id="siteLoader" class="site-loader" aria-hidden="true">
    <div class="loader__inner">
      <img class="loader__logo" src="/assets/images/orange_logo.png" alt="" />
      <span class="loader__wordmark">KENSEI</span>
      <div class="loader__bar-wrap"><div class="loader__bar"></div></div>
    </div>
  </div>
  <script>if(sessionStorage.getItem('k_loaded')){var _l=document.getElementById('siteLoader');if(_l)_l.style.display='none';}</script>

  <nav class="navbar" role="navigation">
    <div class="navbar__inner">
      <a href="/index.html" class="navbar__logo"><img src="../assets/images/orange_logo.png" alt="Kensei" /><span class="navbar__logo-name">KENSEI</span></a>
      <div class="navbar__right" style="margin-left:auto;">
        <div class="lang-selector" id="langSelector"><button class="lang-btn"><span class="lang-flag">FR</span><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4l4 4 4-4"/></svg></button><div class="lang-dropdown"></div></div>
      </div>
    </div>
  </nav>

  <main class="auth-split">
    <!-- Left brand panel -->
    <div class="auth-split__brand" aria-hidden="true">
      <div class="auth-split__brand-inner">
        <img src="../assets/images/orange_logo.png" alt="" class="auth-split__logo" />
        <p class="auth-split__tagline">ORGANISATION ESPORT</p>
        <h2 class="auth-split__heading">KENSEI<br/><span>ESPORT</span></h2>
        <p class="auth-split__desc">Rejoins la communauté Kensei. Suis nos équipes, accède à du contenu exclusif.</p>
        <div class="auth-split__stats">
          <div class="auth-split__stat"><span class="auth-split__stat-val">5+</span><span class="auth-split__stat-lbl">Équipes</span></div>
          <div class="auth-split__stat"><span class="auth-split__stat-val">30+</span><span class="auth-split__stat-lbl">Joueurs</span></div>
          <div class="auth-split__stat"><span class="auth-split__stat-val">2020</span><span class="auth-split__stat-lbl">Fondation</span></div>
        </div>
      </div>
      <div class="auth-split__bg-deco"></div>
    </div>

    <!-- Right form panel -->
    <div class="auth-split__form-wrap">
      <div class="auth-split__form-inner">
        <!-- Tabs -->
        <div class="auth-tabs" role="tablist">
          <button class="auth-tab auth-tab--active" id="tabLogin" role="tab" aria-selected="true" aria-controls="panelLogin" data-i18n="auth_login">Connexion</button>
          <button class="auth-tab" id="tabRegister" role="tab" aria-selected="false" aria-controls="panelRegister" data-i18n="auth_register">Inscription</button>
        </div>

        <!-- Message zone (errors / success) -->
        <div id="formMsg" class="form-error" hidden></div>

        <!-- Login panel -->
        <div id="panelLogin" role="tabpanel" aria-labelledby="tabLogin">
          <p class="auth-split__panel-title">BON RETOUR <span style="color:var(--orange)">PARMI NOUS</span></p>
          <form id="loginForm" novalidate>
            <div class="form-group">
              <label for="loginEmail" data-i18n="auth_email">Email</label>
              <input type="email" id="loginEmail" name="email" required autocomplete="email" maxlength="255" placeholder="votre@email.fr" />
            </div>
            <div class="form-group">
              <label for="loginPassword" data-i18n="auth_password">Mot de passe</label>
              <div class="input-wrap">
                <input type="password" id="loginPassword" name="password" required autocomplete="current-password" maxlength="128" placeholder="••••••••" />
                <button type="button" class="input-toggle-pw" aria-label="Afficher / masquer" tabindex="-1">
                  <svg class="eye-icon eye-icon--show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-icon eye-icon--hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn--primary btn--full" id="loginBtn">
              <span data-i18n="auth_login_btn">Se connecter</span>
            </button>
          </form>
          <p class="auth-split__switch">Pas encore de compte ? <a href="#" id="switchToRegister" data-i18n="auth_register">S'inscrire</a></p>
        </div>

        <!-- Register panel -->
        <div id="panelRegister" role="tabpanel" aria-labelledby="tabRegister" hidden>
          <p class="auth-split__panel-title">REJOINS LA <span style="color:var(--orange)">FAMILLE</span></p>
          <form id="registerForm" novalidate>
            <div class="form-group">
              <label for="regUsername" data-i18n="auth_username">Pseudo</label>
              <input type="text" id="regUsername" name="username" required autocomplete="username" maxlength="32" placeholder="MonPseudo" />
            </div>
            <div class="form-group">
              <label for="regEmail" data-i18n="auth_email">Email</label>
              <input type="email" id="regEmail" name="email" required autocomplete="email" maxlength="255" placeholder="votre@email.fr" />
            </div>
            <div class="form-group">
              <label for="regPassword" data-i18n="auth_password">Mot de passe</label>
              <div class="input-wrap">
                <input type="password" id="regPassword" name="password" required autocomplete="new-password" maxlength="128" placeholder="Min. 8 caractères" />
                <button type="button" class="input-toggle-pw" aria-label="Afficher / masquer" tabindex="-1">
                  <svg class="eye-icon eye-icon--show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-icon eye-icon--hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label for="regPasswordConfirm" data-i18n="auth_password_confirm">Confirmer le mot de passe</label>
              <input type="password" id="regPasswordConfirm" name="password_confirm" required autocomplete="new-password" maxlength="128" placeholder="••••••••" />
            </div>
            <button type="submit" class="btn btn--primary btn--full" id="registerBtn">
              <span data-i18n="auth_register">S'inscrire</span>
            </button>
          </form>
          <p class="auth-split__switch">Déjà un compte ? <a href="#" id="switchToLogin" data-i18n="auth_login">Se connecter</a></p>
        </div>

        <p class="auth-split__legal"><a href="/index.html">← Retour à l'accueil</a></p>
      </div>
    </div>
  </main>

  <script type="module" src="../js/loader.js"></script>
  <script type="module" src="../js/login.js"></script>
  <script type="module" src="../js/navbar.js"></script>
  <script type="module">
    // Password visibility toggles
    document.querySelectorAll('.input-toggle-pw').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.closest('.input-wrap').querySelector('input');
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        btn.querySelector('.eye-icon--show').style.display = isText ? '' : 'none';
        btn.querySelector('.eye-icon--hide').style.display = isText ? 'none' : '';
      });
    });
    // Switch links
    const switchToReg = document.getElementById('switchToRegister');
    const switchToLog = document.getElementById('switchToLogin');
    if (switchToReg) switchToReg.addEventListener('click', e => { e.preventDefault(); document.getElementById('tabRegister').click(); });
    if (switchToLog) switchToLog.addEventListener('click', e => { e.preventDefault(); document.getElementById('tabLogin').click(); });
  </script>
</body>
</html>

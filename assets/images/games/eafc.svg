<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- EA FC green background -->
  <rect width="200" height="200" fill="#0A3D1F"/>
  <!-- Outer border -->
  <rect x="8" y="8" width="184" height="184" rx="6" stroke="#00A550" stroke-width="3" fill="none"/>
  <!-- EA logo top -->
  <rect x="30" y="30" width="60" height="40" rx="4" fill="#00A550"/>
  <text x="60" y="58" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle">EA</text>
  <!-- FC text -->
  <text x="100" y="120" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#00D46A" text-anchor="middle">FC</text>
  <!-- Soccer ball simplified -->
  <circle cx="100" cy="158" r="22" fill="none" stroke="#00A550" stroke-width="2"/>
  <circle cx="100" cy="158" r="8" fill="#00A550"/>
  <line x1="100" y1="136" x2="100" y2="180" stroke="#00A550" stroke-width="1.5"/>
  <line x1="78" y1="158" x2="122" y2="158" stroke="#00A550" stroke-width="1.5"/>
  <line x1="84" y1="141" x2="116" y2="175" stroke="#00A550" stroke-width="1.5"/>
  <line x1="116" y1="141" x2="84" y2="175" stroke="#00A550" stroke-width="1.5"/>
</svg>
